name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: npm

      - name: Check edited file length
        run: node .github/scripts/check-edited-file-lines.mjs

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npm run db:validate

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  docker-runtime:
    name: Docker Runtime
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f docker/api/Dockerfile -t appsec-report-builder-api:${{ github.sha }} .

      - name: Run Docker container
        run: |
          docker run -d \
            --name appsec-report-builder-api \
            -p 3001:3001 \
            -e DATABASE_URL="file:/data/appsec-report-builder.db" \
            appsec-report-builder-api:${{ github.sha }}

      - name: Check API health
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:3001/api/health; then
              exit 0
            fi

            echo "Waiting for API health check..."
            sleep 2
          done

          echo "API health check failed"
          docker logs appsec-report-builder-api
          exit 1

      - name: Stop Docker container
        if: always()
        run: |
          docker stop appsec-report-builder-api || true
          docker rm appsec-report-builder-api || true
